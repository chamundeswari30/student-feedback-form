<!DOCTYPE html>
<html>
<head>
<title>Registration</title>
<style>
body {
  font-family: 'Segoe UI';
  background: linear-gradient(135deg, #2bc0e4, #1b5e9a);
}
.container {
  width: 400px;
  margin: 80px auto;
  background: white;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}
input, select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
}
button {
  width: 100%;
  padding: 12px;
  background: #ff7e5f;
  color: white;
  border: none;
  border-radius: 8px;
}
</style>
</head>
<body>
<div class="container">
<h2>Student Registration</h2>
<form action="feedback1.html">
<input type="text" placeholder="Full Name" required>
<input type="text" placeholder="Register Number" required>
<input type="email" placeholder="Email" required>
<select required>
<option>Select Department</option>
<option>CSE</option>
<option>IT</option>
<option>ECE</option>
</select>
<button type="submit">Next</button>
</form>
</div>
</body>
</html>
